name: CI

on:
  push:
    branches: [main, 'template/**']
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Typecheck + frontend build
        run: npm run build
      - name: Backend syntax check
        run: |
          node --check server/index.mjs
          node --check server/db.mjs
          node --check server/telegram.mjs
